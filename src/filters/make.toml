[filters.make]
description = "Compact make output"
match_command = "^make\\b"
strip_lines_matching = [
  "^make\\[\\d+\\]:",
  "^\\s*$",
  "^Nothing to be done",
]
max_lines = 50
dedup_consecutive = true
error_only = true
on_empty = "make: ok"
smart_truncate = 8
coalesce_directories = true

[[tests.make]]
name = "strips entering/leaving lines"
input = """
make[1]: Entering directory '/home/user'
gcc -O2 foo.c
make[1]: Leaving directory '/home/user'
"""
expected = """
gcc -O2 foo.c
"""

[[tests.make]]
name = "strips blank lines"
input = """
gcc -O2 foo.c

gcc -O2 bar.c
"""
expected = """
gcc -O2 foo.c
gcc -O2 bar.c
"""

[[tests.make]]
name = "on_empty when all stripped"
input = """
make[1]: Entering directory '/home/user'
make[1]: Leaving directory '/home/user'
"""
expected = "make: ok"

[[tests.make]]
name = "dedup consecutive repeated lines"
input = """
gcc -O2 foo.c
gcc -O2 foo.c
gcc -O2 foo.c
gcc -O2 bar.c
gcc -O2 bar.c
"""
expected = "gcc -O2 foo.c [x3]\ngcc -O2 bar.c [x2]"
